<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOMask Lowcost | A Revolução de $0.02</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d1117; color: white; text-align: center; padding: 50px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #30363d; padding: 40px; border-radius: 20px; }
        h1 { color: #58a6ff; }
        .badge { background: #238636; color: white; padding: 8px 20px; border-radius: 50px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .cta-button { background-color: #2ea44f; color: white; padding: 20px 40px; font-size: 1.5rem; border: none; border-radius: 10px; cursor: pointer; text-decoration: none; display: inline-block; }
        .cta-button:hover { background-color: #3fb950; }
        img { max-width: 250px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png.png" alt="NEOMask Logo">
        <h1>NEOMask Lowcost</h1>
        <div class="badge">$0.02 LIFETIME FEE</div>
        <p>A carteira digital mais simples e barata do mundo para artistas e trabalhadores.</p>
        
        <button class="cta-button" id="connectButton">CONNECT WALLET</button>
        
        <p id="status" style="margin-top: 20px; color: #8b949e;"></p>
    </div>

    <script>
        document.getElementById('connectButton').addEventListener('click', async () => {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('status').innerText = "Ligado: " + accounts[0].substring(0,6) + "...";
                    alert("Bem-vindo à NEOMask! A sua conta foi ligada com sucesso.");
                } catch (err) {
                    document.getElementById('status').innerText = "Erro ao ligar.";
                }
            } else {
                alert("Por favor, instale uma carteira (como a MetaMask) para usar a NEOMask.");
            }
        });
    </script>
</body>
</html>
