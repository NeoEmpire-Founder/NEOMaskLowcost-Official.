<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOMask PRO | 100% Functional</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #010409; color: #c9d1d9; text-align: center; margin: 0; padding: 0; }
        .app-container { max-width: 900px; margin: 30px auto; border: 1px solid #30363d; border-radius: 12px; background-color: #0d1117; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .app-header { background-color: #161b22; padding: 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
        .logo { max-width: 60px; }
        h1 { color: #58a6ff; font-size: 1.4rem; margin: 0; }
        .status-badge { background-color: #8b949e; color: white; padding: 5px 12px; border-radius: 50px; font-weight: bold; font-size: 0.8rem; }
        .main-dashboard { padding: 30px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .balance-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 25px; text-align: left; }
        .balance-value { font-size: 2.2rem; font-weight: bold; color: white; margin: 10px 0; }
        .balance-usd { color: #3fb950; font-size: 1.1rem; }
        .action-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 10px; border-radius: 6px; cursor: pointer; flex: 1; }
        .tab-btn.active { border-color: #58a6ff; color: white; background: #30363d; }
        input { width: 100%; background: #010409; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        .cta-button { background-color: #2ea44f; color: white; padding: 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .cta-button:disabled { background-color: #30363d; cursor: not-allowed; }
        .footer-info { padding: 15px; font-size: 0.8rem; color: #8b949e; border-top: 1px solid #30363d; }
        #nftGallery { display: none; grid-template-columns: 1fr 1fr; gap: 10px; }
        .nft-item { background: #21262d; padding: 10px; border-radius: 8px; border: 1px solid #30363d; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <img src="logo.png.png" alt="Logo" class="logo">
        <h1>NEOMask PRO</h1>
        <div class="status-badge" id="netStat">DISCONNECTED</div>
    </header>

    <div class="main-dashboard">
        <div class="balance-card" id="balanceDisplay">
            <h2 style="font-size: 0.8rem; color: #8b949e;">REAL BALANCE</h2>
            <div class="balance-value" id="valNeo">0.0000 ---</div>
            <div class="balance-usd" id="valUsd">$0.00 USD</div>
            <p id="addr" style="font-size: 0.7rem; margin-top: 20px; color: #58a6ff; word-break: break-all;"></p>
        </div>

        <div class="balance-card">
            <div class="action-tabs">
                <button class="tab-btn active" id="showSend">SEND</button>
                <button class="tab-btn" id="showNft">NFTs</button>
            </div>

            <div id="sendSection">
                <input type="text" id="targetAddr" placeholder="Recipient Address (0x...)">
                <input type="number" id="sendQty" placeholder="Amount (ETH/NEO)">
                <button class="cta-button" id="mainBtn">CONNECT WALLET</button>
            </div>

            <div id="nftGallery">
                <div class="nft-item">NFT Asset #1</div>
                <div class="nft-item">NFT Asset #2</div>
                <p style="font-size: 0.7rem; grid-column: span 2;">Scanning for NFTs...</p>
            </div>
        </div>
    </div>
    <footer class="footer-info">NEOMask Protocol v2.0 | Functional Web3 Engine | Fee: $0.02</footer>
</div>

<script>
    let userAccount = "";

    // Alternar Abas
    document.getElementById('showSend').onclick = () => {
        document.getElementById('sendSection').style.display = 'block';
        document.getElementById('nftGallery').style.display = 'none';
        document.getElementById('showSend').classList.add('active');
        document.getElementById('showNft').classList.remove('active');
    };

    document.getElementById('showNft').onclick = () => {
        document.getElementById('sendSection').style.display = 'none';
        document.getElementById('nftGallery').style.display = 'grid';
        document.getElementById('showNft').classList.add('active');
        document.getElementById('showSend').classList.remove('active');
    };

    // Função Principal
    const mainBtn = document.getElementById('mainBtn');

    mainBtn.onclick = async () => {
        if (!window.ethereum) {
            alert("Instale a MetaMask!");
            return;
        }

        // FASE 1: Ligar Carteira
        if (mainBtn.innerText === "CONNECT WALLET") {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                document.getElementById('addr').innerText = userAccount;
                document.getElementById('netStat').innerText = "CONNECTED";
                document.getElementById('netStat').style.backgroundColor = "#238636";
               
                // Buscar Saldo Real
                const balanceHex = await window.ethereum.request({
                    method: 'eth_getBalance',
                    params: [userAccount, 'latest']
                });
                const balance = parseInt(balanceHex, 16) / Math.pow(10, 18);
                document.getElementById('valNeo').innerText = balance.toFixed(4) + " CRYPTO";
               
                mainBtn.innerText = "CONFIRM TRANSACTION";
            } catch (e) { alert("Erro ao ligar!"); }
        }
       
        // FASE 2: Enviar Dinheiro de Verdade
        else if (mainBtn.innerText === "CONFIRM TRANSACTION") {
            const dest = document.getElementById('targetAddr').value;
            const qty = document.getElementById('sendQty').value;

            if (!dest || !qty) {
                alert("Preencha destino e valor!");
                return;
            }

            try {
                const amountHex = (qty * Math.pow(10, 18)).toString(16);
                const params = [{
                    from: userAccount,
                    to: dest,
                    value: '0x' + amountHex
                }];

                await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: params
                });
                alert("Transação enviada!");
            } catch (e) {
                alert("Transação cancelada ou erro de fundos.");
            }
        }
    };
</script>
</body>
</html>
