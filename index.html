<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOMask Lowcost | Official</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0d1117; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; border: 1px solid #30363d; padding: 30px; border-radius: 20px; background: #161b22; }
        .logo { max-width: 200px; margin-bottom: 20px; }
        h1 { color: #58a6ff; font-size: 2rem; }
        .badge { background: #238636; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; display: inline-block; margin: 20px 0; }
        .cta-button { background-color: #2ea44f; color: white; padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .cta-button:hover { background-color: #3fb950; }
        #status { margin-top: 20px; color: #8b949e; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png.png" alt="NEOMask Logo" class="logo">
        <h1>NEOMask Lowcost</h1>
        <div class="badge">$0.02 LIFETIME FEE</div>
        <p>A carteira mais barata do mundo.<br>Simples para todos. Segura para todos.</p>
        
        <button class="cta-button" id="connectButton">CONNECT WALLET</button>
        
        <p id="status">Status: Aguardando ligação...</p>
    </div>

    <script>
        const ownerAddress = "0x2FE2EceC9C671a90923e4BF44200116Bb1F9C3BB";
        
        document.getElementById('connectButton').addEventListener('click', async () => {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAccount = accounts[0];
                    document.getElementById('status').innerText = "Ligado: " + userAccount.substring(0,6) + "...";
                    document.getElementById('connectButton').innerText = "WALLET CONNECTED";
                    document.getElementById('connectButton').style.backgroundColor = "#21262d";
                    alert("Sucesso! A NEOMask reconheceu a sua carteira. Taxas de $0.02 ativadas para si.");
                } catch (err) {
                    document.getElementById('status').innerText = "Erro na ligação.";
                }
            } else {
                alert("Por favor, instale a MetaMask no seu navegador para usar a NEOMask.");
            }
        });
    </script>
</body>
</html>
