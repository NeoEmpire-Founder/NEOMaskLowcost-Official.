<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOMask PRO | Official Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #010409; color: #c9d1d9; margin: 0; padding: 0; }
        .app-container { max-width: 1000px; margin: 40px auto; border: 1px solid #30363d; border-radius: 16px; background-color: #0d1117; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .app-header { background-color: #161b22; padding: 25px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 50px; height: 50px; border-radius: 8px; }
        h1 { font-size: 1.6rem; color: #58a6ff; margin: 0; }
        .status-pill { background-color: #30363d; color: #8b949e; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .connected { background-color: #238636 !important; color: white !important; }
       
        .main-content { padding: 40px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 30px; }
       
        .balance-label { font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 2.8rem; font-weight: bold; color: #ffffff; margin: 15px 0; }
        .balance-usd { font-size: 1.2rem; color: #3fb950; font-weight: 500; }
        .wallet-addr { font-family: monospace; font-size: 0.75rem; color: #58a6ff; background: rgba(88, 166, 255, 0.1); padding: 10px; border-radius: 6px; margin-top: 25px; word-break: break-all; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .tab-btn.active { border-color: #58a6ff; background: #30363d; color: white; }
       
        input { width: 100%; background: #010409; border: 1px solid #30363d; color: white; padding: 14px; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #58a6ff; outline: none; }
       
        .action-btn { background-color: #2ea44f; color: white; padding: 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.3s; }
        .action-btn:hover { background-color: #3fb950; transform: translateY(-2px); }
       
        .footer { padding: 20px; text-align: center; font-size: 0.85rem; color: #8b949e; border-top: 1px solid #30363d; background: #0d1117; }
        .fee-tag { color: #3fb950; font-weight: bold; }
       
        #nft-view { display: none; text-align: center; }
        .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .nft-box { background: #21262d; height: 100px; border-radius: 8px; border: 1px dashed #484f58; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="logo-area">
            <img src="logo.png.png" class="logo-img" alt="NEO">
            <h1>NEOMask PRO</h1>
        </div>
        <div id="status-badge" class="status-pill">DISCONNECTED</div>
    </header>

    <div class="main-content">
        <div class="card">
            <div class="balance-label">Total Portfolio Balance</div>
            <div id="crypto-bal" class="balance-val">0.0000 ---</div>
            <div id="usd-bal" class="balance-usd">$0.00 USD</div>
            <div id="user-address" class="wallet-addr">Connect your wallet to see address</div>
        </div>

        <div class="card">
            <div class="tabs">
                <button id="btn-tab-send" class="tab-btn active">SEND</button>
                <button id="btn-tab-nft" class="tab-btn">NFTs</button>
            </div>

            <div id="send-view">
                <input type="text" id="input-address" placeholder="Recipient Address (0x...)">
                <input type="number" id="input-amount" placeholder="Amount to send">
                <button id="main-action-btn" class="action-btn">CONNECT WALLET</button>
            </div>

            <div id="nft-view">
                <div class="nft-grid">
                    <div class="nft-box">Asset #8841</div>
                    <div class="nft-box">Asset #2293</div>
                </div>
                <p style="margin-top: 20px; font-size: 0.8rem;">No more NFTs found in this wallet.</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        NEOMask Protocol v2.5 | Security Audited | Fixed Low-Cost Fee: <span class="fee-tag">$0.02 USD</span>
    </footer>
</div>

<script>
    // Configuração do Negócio - TUA CARTEIRA DE LUCRO
    const MY_WALLET = "0x2FE2EceC9C671a90923e4BF44200116Bb1F9C3BB";
    const FIXED_FEE = "0.00001"; // Valor da tua comissão (~$0.02)

    let currentUser = "";

    // Elementos da Interface
    const mainBtn = document.getElementById('main-action-btn');
    const statusPill = document.getElementById('status-badge');
    const addrDisplay = document.getElementById('user-address');
    const cryptoDisplay = document.getElementById('crypto-bal');

    // Navegação entre abas
    document.getElementById('btn-tab-send').onclick = () => {
        document.getElementById('send-view').style.display = 'block';
        document.getElementById('nft-view').style.display = 'none';
        document.getElementById('btn-tab-send').classList.add('active');
        document.getElementById('btn-tab-nft').classList.remove('active');
    };

    document.getElementById('btn-tab-nft').onclick = () => {
        document.getElementById('send-view').style.display = 'none';
        document.getElementById('nft-view').style.display = 'block';
        document.getElementById('btn-tab-nft').classList.add('active');
        document.getElementById('btn-tab-send').classList.remove('active');
    };

    // Lógica Funcional
    mainBtn.onclick = async () => {
        if (!window.ethereum) return alert("MetaMask não detetada!");

        // 1. Conectar
        if (mainBtn.innerText === "CONNECT WALLET") {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                currentUser = accounts[0];
               
                // Atualizar UI
                statusPill.innerText = "CONNECTED";
                statusPill.classList.add('connected');
                addrDisplay.innerText = currentUser;
               
                // Buscar Saldo Real na Blockchain
                const balHex = await window.ethereum.request({
                    method: 'eth_getBalance', params: [currentUser, 'latest']
                });
                const realBal = (parseInt(balHex, 16) / Math.pow(10, 18)).toFixed(4);
                cryptoDisplay.innerText = realBal + " ETH/NEO";
                document.getElementById('usd-bal').innerText = "$" + (realBal * 3000).toFixed(2) + " USD"; // Estimativa
               
                mainBtn.innerText = "CONFIRM TRANSACTION";
            } catch (e) { console.error(e); }
        }
       
        // 2. Enviar Dinheiro e Pagar tua Comissão
        else {
            const target = document.getElementById('input-address').value;
            const amount = document.getElementById('input-amount').value;

            if (!target || !amount) return alert("Preencha o destino e o valor!");

            try {
                // Transação do Cliente para o Destino
                const tx1 = {
                    from: currentUser,
                    to: target,
                    value: '0x' + (amount * Math.pow(10, 18)).toString(16)
                };

                // Transação da Tua Comissão para a Tua Carteira
                const txFee = {
                    from: currentUser,
                    to: MY_WALLET,
                    value: '0x' + (FIXED_FEE * Math.pow(10, 18)).toString(16)
                };

                // Disparar ambas na MetaMask
                await window.ethereum.request({ method: 'eth_sendTransaction', params: [tx1] });
                await window.ethereum.request({ method: 'eth_sendTransaction', params: [txFee] });

                alert("Sucesso! Transação enviada com taxa low-cost de $0.02.");
            } catch (e) {
                alert("Operação cancelada pelo utilizador.");
            }
        }
    };
</script>
</body>
</html>
